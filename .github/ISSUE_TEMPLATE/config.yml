# Issue template chooser configuration.
# https://docs.github.com/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository

blank_issues_enabled: true

contact_links:
  - name: Security vulnerability (report privately)
    url: https://github.com/maxbaluev/accreted-intelligence/blob/main/.github/SECURITY.md
    about: >-
      Do NOT open a public issue for a security vulnerability. Report it privately via a
      GitHub private security advisory — see SECURITY.md for the full process and contact.
  - name: Project discussion & questions
    url: https://github.com/maxbaluev/accreted-intelligence/issues
    about: >-
      Usage questions, ideas, and general discussion — search existing issues first, then
      open one with the most fitting template above.
